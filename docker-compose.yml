services:
  postgres:
    image: postgres:17

    container_name: student_registry_db

    environment:
      POSTGRES_DB: student_registry
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  pgadmin:
    image: dpage/pgadmin4

    container_name: student_registry_pgadmin

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.lt
      PGADMIN_DEFAULT_PASSWORD: admin

    ports:
      - "5050:80"

    depends_on:
      - postgres

  backend:
    build:
      context: ./backend

    container_name: student_registry_api

    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: student_registry
      DB_USER: postgres
      DB_PASSWORD: postgres

    ports:
      - "3003:3000"

    depends_on:
      - postgres

volumes:
  postgres_data: